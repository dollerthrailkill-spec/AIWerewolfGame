<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模型考试 - 暗黑奇幻版</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="/static/css/custom-animations.css" rel="stylesheet">
    <link href="/static/css/custom-style.css" rel="stylesheet">
    <style>
        .score-display {
            font-size: 1.25rem;
            font-weight: bold;
        }
        .answer-result.correct {
            color: #10b981;
        }
        .answer-result.incorrect {
            color: #ef4444;
        }
        .question-number {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .file-list-item {
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-list-item:hover {
            border-color: #fbbf24;
        }
        .file-list-item.selected {
            border-color: #fbbf24;
            background-color: #1f2937;
        }
        #drop-zone {
            border: 2px dashed rgba(212, 168, 48, 0.5);
            transition: all 0.3s;
        }
        #drop-zone.dragover {
            border-color: #fbbf24;
            background-color: rgba(251, 191, 36, 0.1);
        }
        .model-btn.selected {
            background: linear-gradient(135deg, rgba(212, 168, 48, 0.3), rgba(212, 168, 48, 0.1));
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
            transform: scale(1.02);
        }
        .model-btn.selected::before {
            content: '✓';
            color: #fbbf24;
            font-weight: bold;
            margin-right: 8px;
        }
        .tab-btn {
            position: relative;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #fbbf24;
            border-bottom-color: #fbbf24;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: #fbbf24;
            border-radius: 1px;
        }
    </style>
</head>
<body class="font-noto-sans text-gray-100 min-h-screen overflow-x-hidden selection:bg-gold-500/30">
    <div class="grain-overlay fixed inset-0 z-0 pointer-events-none"></div>

    <audio id="button-click" src="/static/audio/button-click.wav" preload="none"></audio>

    <script src="/static/js/audio.js"></script>

    <div id="exam-page" class="relative z-10 min-h-screen flex flex-col items-center px-4 py-8">
        <button id="back-btn" class="absolute top-4 left-4 bg-gray-900/80 border-2 border-gold-500/30 hover:border-gold-500 text-gray-100 py-2 px-4 rounded-lg font-noto-sans transition-all duration-300 hover:bg-gold-500/10 shadow-lg">
            <i class="fa fa-arrow-left mr-2"></i> 返回主页
        </button>

        <h1 class="mt-16 md:mt-24 text-4xl md:text-5xl font-cinzel text-white tracking-widest mb-8 text-center drop-shadow-lg">
            AI 模型考试
        </h1>

        <div class="flex gap-1 mb-6 border-b-2 border-gold-500/20">
            <button class="tab-btn active text-lg font-cinzel text-gray-400 hover:text-gold-400 py-2 px-6 border-b-2 border-transparent tracking-wide transition-all" data-tab="exam">
                <i class="fa fa-pencil-square-o mr-2"></i> 考试
            </button>
            <button class="tab-btn text-lg font-cinzel text-gray-400 hover:text-gold-400 py-2 px-6 border-b-2 border-transparent tracking-wide transition-all" data-tab="records">
                <i class="fa fa-list-alt mr-2"></i> 考试记录
            </button>
        </div>

        <div id="exam-tab" class="tab-content bg-gray-900/90 border-2 border-gold-500/20 rounded-lg p-6 max-w-3xl w-full shadow-xl">
            <div id="file-selection" class="mb-6">
                <h3 class="text-xl font-cinzel text-white mb-4 tracking-wide">选择题库</h3>
                <div id="file-list" class="grid gap-3 mb-4"></div>

                <div id="upload-section" class="mt-4">
                    <h4 class="font-cinzel text-white mb-2 tracking-wide">上传新题库</h4>
                    <div id="drop-zone" class="bg-gray-900/60 border-2 border-gold-500/30 rounded-lg p-6 text-center cursor-pointer transition-all duration-300 hover:border-gold-500">
                        <i class="fa fa-cloud-upload text-3xl text-gold-500 mb-3"></i>
                        <p>拖放文件到这里，或点击选择</p>
                        <p class="text-sm text-gray-500 mt-2">支持 .txt 格式</p>
                        <input type="file" id="file-input" accept=".txt" class="hidden">
                    </div>
                </div>
            </div>

            <div id="provider-selection" class="mb-6">
                <h3 class="text-xl font-cinzel text-white mb-4 tracking-wide">选择模型</h3>
                <div id="providers-list" class="grid gap-3"></div>
            </div>

            <div id="exam-info" class="mb-6 hidden">
                <div class="flex justify-between items-center">
                    <div>
                        <span class="text-lg">题目进度: </span>
                        <span id="question-progress" class="font-cinzel text-gold-400">1 / 50</span>
                    </div>
                    <div class="score-display">
                        <span>总分: </span>
                        <span id="total-score" class="text-gold-400">0</span>
                        <span> / 100</span>
                    </div>
                </div>
            </div>

            <div id="question-area" class="hidden">
                <div class="question-number text-gold-400 mb-3">
                    <span id="current-question-num">第 1 题</span>
                </div>
                <div id="question-text" class="text-lg mb-6 leading-relaxed text-gray-200"></div>

                <div id="answer-area" class="mb-6">
                    <div id="loading-indicator" class="hidden text-center py-4">
                        <i class="fa fa-spinner fa-spin text-2xl text-gold-400"></i>
                        <p class="mt-2">正在请求模型回答...</p>
                    </div>

                    <div id="answer-result" class="hidden">
                        <div class="mb-4">
                            <h4 class="font-cinzel text-gold-400 mb-2 tracking-wide">模型回答:</h4>
                            <p id="model-answer" class="bg-gray-800/80 p-3 rounded border border-gold-500/20"></p>
                        </div>
                        <div class="mb-4">
                            <h4 class="font-cinzel text-gold-400 mb-2 tracking-wide">正确答案:</h4>
                            <p id="correct-answer" class="bg-gray-800/80 p-3 rounded border border-gold-500/20"></p>
                        </div>
                        <div class="text-center mb-4">
                            <span id="score-result" class="text-2xl font-cinzel"></span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center gap-4">
                    <button id="submit-answer-btn" class="bg-gray-800 border-2 border-gold-500/30 hover:border-gold-500 text-gray-100 py-2 px-6 rounded-lg font-noto-sans transition-all duration-300 hover:bg-gold-500/10 shadow-lg">
                        <i class="fa fa-paper-plane mr-2"></i> 请求模型回答
                    </button>
                    <button id="next-question-btn" class="bg-gray-800 border-2 border-gold-500/30 hover:border-gold-500 text-gray-100 py-2 px-6 rounded-lg font-noto-sans transition-all duration-300 hover:bg-gold-500/10 hidden shadow-lg">
                        <i class="fa fa-arrow-right mr-2"></i> 下一题
                    </button>
                </div>

                <div id="auto-exam-controls" class="hidden mt-4">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="flex-1 bg-gray-800/60 rounded-full h-2 overflow-hidden">
                            <div id="auto-exam-progress-bar" class="bg-gradient-to-r from-gold-500 to-gold-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <span id="auto-exam-progress-text" class="text-xs text-gray-400 whitespace-nowrap">0/0</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span id="auto-exam-status" class="text-sm text-gold-400">
                            <i class="fa fa-spinner fa-spin mr-1"></i> 自动考试中...
                        </span>
                        <button id="stop-auto-exam-btn" class="bg-red-900/60 border border-red-500/30 hover:border-red-500 text-red-300 py-1.5 px-4 rounded-lg text-sm transition-all duration-300 hover:bg-red-500/10">
                            <i class="fa fa-stop mr-1"></i> 停止自动考试
                        </button>
                    </div>
                </div>
            </div>

            <div id="exam-complete" class="hidden text-center">
                <h2 class="text-3xl font-cinzel text-gold-400 mb-6 tracking-widest">考试完成!</h2>
                <div class="mb-6">
                    <p class="text-2xl mb-2">最终得分</p>
                    <p id="final-score" class="text-5xl font-cinzel text-gold-400">0</p>
                    <p class="text-xl">/ <span id="max-score">100</span></p>
                </div>
                <div class="mb-6">
                    <p>正确: <span id="correct-count" class="text-green-400">0</span> 题</p>
                    <p>错误: <span id="incorrect-count" class="text-red-400">0</span> 题</p>
                </div>
                <div class="flex justify-center gap-4">
                    <button id="restart-btn" class="bg-gray-800 border-2 border-gold-500/30 hover:border-gold-500 text-gray-100 py-2 px-6 rounded-lg font-noto-sans transition-all duration-300 hover:bg-gold-500/10 shadow-lg">
                        <i class="fa fa-refresh mr-2"></i> 重新考试
                    </button>
                    <button id="view-records-btn" class="bg-gray-800 border-2 border-gold-500/30 hover:border-gold-500 text-gray-100 py-2 px-6 rounded-lg font-noto-sans transition-all duration-300 hover:bg-gold-500/10 shadow-lg">
                        <i class="fa fa-list-alt mr-2"></i> 考试记录
                    </button>
                </div>
            </div>
        </div>

        <div id="records-tab" class="tab-content hidden bg-gray-900/90 border-2 border-gold-500/20 rounded-lg p-6 max-w-4xl w-full shadow-xl">
            <div id="records-table-container" class="overflow-x-auto">
                <table class="w-full text-left min-w-[700px]">
                    <thead>
                        <tr class="border-b border-gold-500/20 text-gold-400 text-sm">
                            <th class="py-2 px-3">模型名称</th>
                            <th class="py-2 px-3 text-center">数学</th>
                            <th class="py-2 px-3 text-center">语文</th>
                            <th class="py-2 px-3 text-center">英语</th>
                            <th class="py-2 px-3 text-center">物理</th>
                            <th class="py-2 px-3 text-center">化学</th>
                            <th class="py-2 px-3 text-center">总分</th>
                            <th class="py-2 px-3 text-center">考试时间</th>
                        </tr>
                    </thead>
                    <tbody id="records-tbody"></tbody>
                </table>
                <div id="records-empty" class="hidden text-center py-8 text-gray-500">
                    <i class="fa fa-inbox text-3xl mb-2"></i>
                    <p>暂无考试记录</p>
                </div>
            </div>
            <div id="records-pagination" class="flex justify-center items-center gap-2 mt-4 hidden">
                <button id="prev-page-btn" class="bg-gray-800 border border-gold-500/30 hover:border-gold-500 text-gray-300 py-1 px-3 rounded text-sm transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fa fa-chevron-left mr-1"></i> 上一页
                </button>
                <span id="page-info" class="text-sm text-gray-400 px-3"></span>
                <button id="next-page-btn" class="bg-gray-800 border border-gold-500/30 hover:border-gold-500 text-gray-300 py-1 px-3 rounded text-sm transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                    下一页 <i class="fa fa-chevron-right ml-1"></i>
                </button>
            </div>
        </div>

        <div class="mt-8 text-sm text-gray-500">
            © 2026 AI 狼人杀 - 暗黑奇幻版
        </div>
    </div>

    <script>
        let providers = [];
        let selectedProviderId = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let correctCount = 0;
        let answers = [];
        let examFiles = [];
        let selectedFile = null;
        let autoExamRunning = false;
        let autoExamStopRequested = false;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initAudio();
            loadExamFiles();
            loadProviders();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('back-btn').addEventListener('click', () => {
                playSound({ id: 'button-click' });
                setTimeout(() => {
                    window.location.href = '/';
                }, 100);
            });

            document.getElementById('submit-answer-btn').addEventListener('click', submitAnswer);
            document.getElementById('next-question-btn').addEventListener('click', nextQuestion);
            document.getElementById('restart-btn').addEventListener('click', restartExam);
            document.getElementById('view-records-btn').addEventListener('click', () => {
                playSound({ id: 'button-click' });
                switchTab('records');
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    playSound({ id: 'button-click' });
                    switchTab(btn.dataset.tab);
                });
            });

            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');

            dropZone.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', handleFileSelect);

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');

            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tabName + '-tab').classList.remove('hidden');

            if (tabName === 'records') {
                loadExamRecords(1);
            }
        }

        async function loadExamFiles() {
            try {
                const resp = await fetch('/api/exam/files', {
                    cache: 'no-store'
                });
                const data = await resp.json();
                if (data.success) {
                    examFiles = data.files;
                    renderFileList();
                }
            } catch (e) {
                console.error('加载题库列表失败', e);
            }
        }

        function renderFileList() {
            const container = document.getElementById('file-list');
            if (examFiles.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">没有可用题库，请上传新题库</p>';
                return;
            }

            container.innerHTML = examFiles.map(f => `
                <div class="file-list-item bg-gray-800/60 border-2 border-gold-500/20 py-3 px-4 rounded-lg transition-all duration-300 hover:border-gold-500" data-file="${escapeHtml(f)}">
                    <div class="flex justify-between items-center">
                        <div>
                            <i class="fa fa-file-text-o text-gold-400 mr-2"></i>
                            <span class="font-cinzel">${escapeHtml(f)}</span>
                        </div>
                        <i class="fa fa-check-circle text-gold-400 hidden check-icon"></i>
                    </div>
                </div>
            `).join('');

            container.querySelectorAll('.file-list-item').forEach(el => {
                el.addEventListener('click', () => {
                    container.querySelectorAll('.file-list-item').forEach(e => {
                        e.classList.remove('selected');
                        e.querySelector('.check-icon').classList.add('hidden');
                    });
                    el.classList.add('selected');
                    el.querySelector('.check-icon').classList.remove('hidden');
                    selectedFile = el.dataset.file;
                });
            });

            if (examFiles.length > 0) {
                container.querySelector('.file-list-item').click();
            }
        }

        async function handleFileSelect(e) {
            if (e.target.files.length) {
                await handleFile(e.target.files[0]);
            }
        }

        async function handleFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const resp = await fetch('/api/exam/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await resp.json();
                if (data.success) {
                    alert(data.message);
                    await loadExamFiles();
                } else {
                    alert('上传失败：' + data.message);
                }
            } catch (e) {
                console.error('上传文件失败', e);
                alert('上传失败');
            }
        }

        async function loadProviders() {
            try {
                const resp = await fetch('/api/config', {
                    cache: 'no-store'
                });
                const data = await resp.json();
                providers = Object.values(data.providers || {});
                renderProviders();
            } catch (e) {
                console.error('加载providers失败', e);
            }
        }

        let selectedModel = null;

        function renderProviders() {
            const container = document.getElementById('providers-list');
            if (providers.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">请先在狼人杀设置中配置API</p>';
                return;
            }

            container.innerHTML = providers.map(p => {
                const models = p.used_models || (p.default_model ? [p.default_model] : []);
                if (models.length === 0) {
                    return `
                        <div class="provider-option bg-gray-800/60 border-2 border-gold-500/20 text-gray-100 py-3 px-4 rounded-lg transition-all duration-300 text-left opacity-60">
                            <div class="font-cinzel text-lg text-gold-400">${escapeHtml(p.name)}</div>
                            <div class="text-sm opacity-80">请先在API设置中添加模型</div>
                        </div>
                    `;
                }
                return `
                    <div class="provider-option bg-gray-800/60 border-2 border-gold-500/20 hover:border-gold-500 text-gray-100 py-3 px-4 rounded-lg transition-all duration-300" data-provider-id="${escapeHtml(p.id)}">
                        <div class="font-cinzel text-lg text-gold-400 mb-3">${escapeHtml(p.name)}</div>
                        <div class="models-grid grid gap-2">
                            ${models.map(m => `
                                <button class="model-btn bg-gray-900 border border-gold-500/20 hover:border-gold-500 text-gray-100 py-2 px-3 rounded transition-all duration-300 text-sm text-left"
                                        data-provider-id="${escapeHtml(p.id)}" data-model="${escapeHtml(m)}">
                                    ${escapeHtml(m)}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            container.querySelectorAll('.model-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    container.querySelectorAll('.model-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedProviderId = btn.dataset.providerId;
                    selectedModel = btn.dataset.model;
                });
            });

            const startBtn = document.createElement('button');
            startBtn.id = 'start-exam-btn';
            startBtn.className = 'w-full mt-6 bg-gray-800 border-2 border-gold-500/30 hover:border-gold-500 text-gray-100 py-3 px-6 rounded-lg font-noto-sans transition-all duration-300 hover:bg-gold-500/10 shadow-lg';
            startBtn.innerHTML = '<i class="fa fa-play mr-2"></i> 开始考试';
            startBtn.disabled = true;
            startBtn.onclick = () => {
                playSound({ id: 'button-click' });
                if (selectedProviderId && selectedModel && selectedFile) {
                    startExam();
                }
            };
            container.appendChild(startBtn);

            const autoBtn = document.createElement('button');
            autoBtn.id = 'auto-exam-btn';
            autoBtn.className = 'w-full mt-3 bg-gray-800 border-2 border-gold-500/30 hover:border-gold-500 text-gray-100 py-3 px-6 rounded-lg font-noto-sans transition-all duration-300 hover:bg-gold-500/10 shadow-lg';
            autoBtn.innerHTML = '<i class="fa fa-forward mr-2"></i> 自动考试（逐题自动请求模型）';
            autoBtn.disabled = true;
            autoBtn.onclick = () => {
                playSound({ id: 'button-click' });
                if (selectedProviderId && selectedModel && selectedFile) {
                    startAutoExam();
                }
            };
            container.appendChild(autoBtn);

            const recordsBtn = document.createElement('button');
            recordsBtn.id = 'goto-records-btn';
            recordsBtn.className = 'w-full mt-3 bg-gray-800 border-2 border-gold-500/30 hover:border-gold-500 text-gray-100 py-3 px-6 rounded-lg font-noto-sans transition-all duration-300 hover:bg-gold-500/10 shadow-lg';
            recordsBtn.innerHTML = '<i class="fa fa-list-alt mr-2"></i> 考试记录';
            recordsBtn.onclick = () => {
                playSound({ id: 'button-click' });
                switchTab('records');
            };
            container.appendChild(recordsBtn);

            let hasSelected = false;
            container.querySelectorAll('.model-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    hasSelected = true;
                    if (selectedFile) {
                        startBtn.disabled = false;
                        autoBtn.disabled = false;
                    }
                });
            });
        }

        async function startExam() {
            try {
                const url = selectedFile ?
                    `/api/exam/questions?file_name=${encodeURIComponent(selectedFile)}` :
                    '/api/exam/questions';

                const resp = await fetch(url, {
                    cache: 'no-store'
                });
                const data = await resp.json();
                if (data.success) {
                    questions = data.questions || [];
                    if (questions.length === 0) {
                        alert('题库为空，请先上传题目文件');
                        return;
                    }

                    currentQuestionIndex = 0;
                    totalScore = 0;
                    correctCount = 0;
                    answers = [];

                    document.getElementById('file-selection').classList.add('hidden');
                    document.getElementById('provider-selection').classList.add('hidden');
                    document.getElementById('exam-info').classList.remove('hidden');
                    document.getElementById('question-area').classList.remove('hidden');
                    document.getElementById('exam-complete').classList.add('hidden');

                    document.getElementById('max-score').textContent = questions.length * 2;

                    showCurrentQuestion();
                } else {
                    alert(data.message || '加载题目失败');
                }
            } catch (e) {
                console.error('加载题目失败', e);
                alert('加载题目失败');
            }
        }

        function showCurrentQuestion() {
            const q = questions[currentQuestionIndex];
            if (!q) {
                alert('题目数据加载失败');
                return;
            }

            const questionId = q.id !== undefined ? q.id : (currentQuestionIndex + 1);
            const questionText = q.question || '题目内容加载失败';

            document.getElementById('question-progress').textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('current-question-num').textContent = `第 ${questionId} 题`;
            document.getElementById('question-text').textContent = questionText;

            document.getElementById('answer-result').classList.add('hidden');
            document.getElementById('loading-indicator').classList.add('hidden');
            document.getElementById('submit-answer-btn').classList.remove('hidden');
            document.getElementById('next-question-btn').classList.add('hidden');

            updateScoreDisplay();
        }

        async function submitAnswer() {
            if (!selectedProviderId || !selectedModel) return;

            const q = questions[currentQuestionIndex];
            if (!q) {
                alert('当前题目不存在，请重新开始考试');
                return;
            }

            document.getElementById('loading-indicator').classList.remove('hidden');
            document.getElementById('submit-answer-btn').disabled = true;

            try {
                const payload = {
                    provider_id: selectedProviderId,
                    question_id: q.id,
                    model: selectedModel
                };

                if (selectedFile) {
                    payload.file_name = selectedFile;
                }

                const resp = await fetch('/api/exam/answer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await resp.json();
                if (data.success) {
                    showAnswerResult(data);
                } else {
                    alert(data.message || '请求失败');
                }
            } catch (e) {
                console.error('提交答案失败', e);
                alert('提交答案失败');
            }

            document.getElementById('loading-indicator').classList.add('hidden');
            document.getElementById('submit-answer-btn').disabled = false;
        }

        function showAnswerResult(data) {
            const score = typeof data.score === 'number' ? data.score : 0;
            const isCorrect = data.is_correct === true;
            const modelAnswer = data.model_answer || '模型未返回答案';
            const correctAnswer = data.correct_answer || '正确答案未提供';

            totalScore += score;
            if (isCorrect) {
                correctCount++;
            }

            answers.push(data);

            document.getElementById('answer-result').classList.remove('hidden');
            document.getElementById('model-answer').textContent = modelAnswer;
            document.getElementById('correct-answer').textContent = correctAnswer;

            const scoreResult = document.getElementById('score-result');
            if (isCorrect) {
                scoreResult.textContent = `+${score} 分 (正确)`;
                scoreResult.className = 'text-2xl font-gothic answer-result correct';
            } else {
                scoreResult.textContent = `+${score} 分 (错误)`;
                scoreResult.className = 'text-2xl font-gothic answer-result incorrect';
            }

            document.getElementById('submit-answer-btn').classList.add('hidden');

            if (!autoExamRunning) {
                if (currentQuestionIndex < questions.length - 1) {
                    document.getElementById('next-question-btn').classList.remove('hidden');
                } else {
                    setTimeout(showExamComplete, 1500);
                }
            }

            updateScoreDisplay();
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                showCurrentQuestion();
            } else {
                showExamComplete();
            }
        }

        function updateScoreDisplay() {
            document.getElementById('total-score').textContent = totalScore || 0;
        }

        function showExamComplete() {
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('exam-complete').classList.remove('hidden');
            document.getElementById('final-score').textContent = totalScore || 0;
            document.getElementById('correct-count').textContent = correctCount || 0;
            document.getElementById('incorrect-count').textContent = (questions.length || 0) - (correctCount || 0);
            saveExamRecord();
        }

        function extractSubject(fileName) {
            if (!fileName) return '综合';
            const name = fileName.toLowerCase();
            if (name.includes('语文') || name.includes('chinese')) return '语文';
            if (name.includes('数学') || name.includes('奥数') || name.includes('math')) return '数学';
            if (name.includes('英语') || name.includes('english')) return '英语';
            if (name.includes('物理') || name.includes('physics')) return '物理';
            if (name.includes('化学') || name.includes('chemistry')) return '化学';
            return '综合';
        }

        async function saveExamRecord() {
            if (!selectedModel || !selectedFile) return;
            try {
                await fetch('/api/exam/record', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model_name: selectedModel,
                        subject: extractSubject(selectedFile),
                        score: totalScore,
                        total_questions: questions.length,
                        correct_count: correctCount,
                    })
                });
            } catch (e) {
                console.error('保存考试记录失败', e);
            }
        }

        async function loadExamRecords(page) {
            const tbody = document.getElementById('records-tbody');
            const empty = document.getElementById('records-empty');
            const pagination = document.getElementById('records-pagination');
            const pageInfo = document.getElementById('page-info');
            const prevBtn = document.getElementById('prev-page-btn');
            const nextBtn = document.getElementById('next-page-btn');

            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-gray-500"><i class="fa fa-spinner fa-spin mr-2"></i>加载中...</td></tr>';

            try {
                const resp = await fetch('/api/exam/records?page=' + page);
                const data = await resp.json();

                if (!data.success || !data.records || data.records.length === 0) {
                    tbody.innerHTML = '';
                    empty.classList.remove('hidden');
                    pagination.classList.add('hidden');
                    return;
                }

                empty.classList.add('hidden');
                const subjects = ['数学', '语文', '英语', '物理', '化学'];
                tbody.innerHTML = data.records.map(r => {
                    const subjectCells = subjects.map(s => {
                        const val = r.scores[s];
                        if (val === null || val === undefined) {
                            return '<td class="py-2 px-3 text-center text-gray-600">-</td>';
                        }
                        return '<td class="py-2 px-3 text-center text-gold-400 font-bold">' + val + '</td>';
                    }).join('');

                    const totalDisplay = r.total_score !== null && r.total_score !== undefined
                        ? '<span class="text-gold-400 font-bold text-lg">' + r.total_score + '</span>'
                        : '<span class="text-gray-600">-</span>';

                    return '<tr class="border-b border-gray-700/30 hover:bg-gray-800/40 transition-colors">'
                        + '<td class="py-2 px-3 text-gray-200 font-medium">' + escapeHtml(r.model_name) + '</td>'
                        + subjectCells
                        + '<td class="py-2 px-3 text-center">' + totalDisplay + '</td>'
                        + '<td class="py-2 px-3 text-center text-gray-400 text-sm">' + (r.exam_date || '-') + '</td>'
                        + '</tr>';
                }).join('');

                pagination.classList.remove('hidden');
                pageInfo.textContent = '第 ' + data.page + ' / ' + data.total_pages + ' 页 (共 ' + data.total + ' 条)';
                prevBtn.disabled = data.page <= 1;
                nextBtn.disabled = data.page >= data.total_pages;
                prevBtn.onclick = function() { if (data.page > 1) loadExamRecords(data.page - 1); };
                nextBtn.onclick = function() { if (data.page < data.total_pages) loadExamRecords(data.page + 1); };
            } catch (e) {
                console.error('加载考试记录失败', e);
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-red-400">加载失败，请重试</td></tr>';
            }
        }

        async function startAutoExam() {
            autoExamRunning = true;
            autoExamStopRequested = false;
            await startExam();
            if (!questions.length) {
                autoExamRunning = false;
                return;
            }
            document.getElementById('auto-exam-controls').classList.remove('hidden');
            document.getElementById('submit-answer-btn').classList.add('hidden');
            document.getElementById('next-question-btn').classList.add('hidden');
            document.getElementById('stop-auto-exam-btn').onclick = stopAutoExam;
            updateAutoExamProgress();
            await runAutoExamLoop();
        }

        function stopAutoExam() {
            autoExamStopRequested = true;
            document.getElementById('auto-exam-status').innerHTML = '<i class="fa fa-pause mr-1"></i> 正在停止...';
            document.getElementById('stop-auto-exam-btn').disabled = true;
        }

        function updateAutoExamProgress() {
            const done = currentQuestionIndex;
            const total = questions.length;
            const pct = total > 0 ? (done / total) * 100 : 0;
            document.getElementById('auto-exam-progress-bar').style.width = pct + '%';
            document.getElementById('auto-exam-progress-text').textContent = done + '/' + total;
        }

        async function runAutoExamLoop() {
            while (currentQuestionIndex < questions.length && !autoExamStopRequested) {
                updateAutoExamProgress();
                document.getElementById('auto-exam-status').innerHTML =
                    '<i class="fa fa-spinner fa-spin mr-1"></i> 正在请求第 ' + (currentQuestionIndex + 1) + ' 题...';

                let answered = false;
                try {
                    answered = await submitAnswerInternal();
                } catch (e) {
                    console.error('自动考试第 ' + (currentQuestionIndex + 1) + ' 题失败:', e);
                }

                if (autoExamStopRequested) break;

                if (!answered) {
                    document.getElementById('auto-exam-status').innerHTML =
                        '<i class="fa fa-exclamation-circle mr-1"></i> 第 ' + (currentQuestionIndex + 1) + ' 题请求失败，3秒后重试...';
                    await sleep(3000);
                    continue;
                }

                if (currentQuestionIndex < questions.length - 1) {
                    document.getElementById('auto-exam-status').innerHTML =
                        '<i class="fa fa-check-circle mr-1"></i> 第 ' + (currentQuestionIndex + 1) + ' 题已完成，2秒后进入下一题...';
                    await sleep(2000);
                    currentQuestionIndex++;
                    document.getElementById('answer-result').classList.add('hidden');
                    showCurrentQuestion();
                    document.getElementById('submit-answer-btn').classList.add('hidden');
                    document.getElementById('next-question-btn').classList.add('hidden');
                } else {
                    document.getElementById('auto-exam-status').innerHTML =
                        '<i class="fa fa-check-circle mr-1"></i> 全部题目已完成！';
                    await sleep(1000);
                    break;
                }
            }

            if (autoExamStopRequested) {
                document.getElementById('auto-exam-status').innerHTML =
                    '<i class="fa fa-stop-circle mr-1"></i> 已停止，当前进度 ' + currentQuestionIndex + '/' + questions.length;
                document.getElementById('auto-exam-controls').classList.add('hidden');
                document.getElementById('submit-answer-btn').classList.remove('hidden');
                if (currentQuestionIndex < questions.length - 1) {
                    document.getElementById('next-question-btn').classList.remove('hidden');
                }
            } else {
                document.getElementById('auto-exam-controls').classList.add('hidden');
                showExamComplete();
            }

            autoExamRunning = false;
            autoExamStopRequested = false;
        }

        async function submitAnswerInternal() {
            if (!selectedProviderId || !selectedModel) return false;

            const q = questions[currentQuestionIndex];
            if (!q) return false;

            const payload = {
                provider_id: selectedProviderId,
                question_id: q.id,
                model: selectedModel
            };
            if (selectedFile) {
                payload.file_name = selectedFile;
            }

            const maxRetries = 3;
            for (let attempt = 0; attempt < maxRetries; attempt++) {
                if (autoExamStopRequested) throw new Error('用户停止');

                document.getElementById('loading-indicator').classList.remove('hidden');

                const resp = await fetch('/api/exam/answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (resp.status === 429) {
                    const waitTime = Math.pow(2, attempt) * 2000;
                    document.getElementById('auto-exam-status').innerHTML =
                        '<i class="fa fa-exclamation-triangle mr-1"></i> 请求过于频繁，等待 ' + (waitTime / 1000) + ' 秒后重试...';
                    await sleep(waitTime);
                    continue;
                }

                const data = await resp.json();
                if (data.success) {
                    showAnswerResult(data);
                    return true;
                }

                if (attempt < maxRetries - 1) {
                    document.getElementById('auto-exam-status').innerHTML =
                        '<i class="fa fa-refresh mr-1"></i> 第 ' + (currentQuestionIndex + 1) + ' 题失败，重试中 (' + (attempt + 1) + '/' + maxRetries + ')...';
                    await sleep(1000);
                }
            }

            document.getElementById('loading-indicator').classList.add('hidden');
            return false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function restartExam() {
            playSound({ id: 'button-click' });
            currentQuestionIndex = 0;
            totalScore = 0;
            correctCount = 0;
            answers = [];
            autoExamRunning = false;
            autoExamStopRequested = false;

            document.getElementById('file-selection').classList.remove('hidden');
            document.getElementById('provider-selection').classList.remove('hidden');
            document.getElementById('exam-info').classList.add('hidden');
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('exam-complete').classList.add('hidden');
            document.getElementById('auto-exam-controls').classList.add('hidden');
            document.getElementById('total-score').textContent = '0';
        }
    </script>
</body>
</html>
